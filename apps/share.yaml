deployments:
  - name: app
    replicaCount: 1
    containers:
      - name: app
        image:
          repository: jhaals/yopass:14.2.0
          pullPolicy: IfNotPresent
        args:
          - "--memcached=localhost:11211"
          - "--disable-features"
          - "--disable-upload"
        ports:
          - name: http
            containerPort: 1337
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      - name: memcached
        image:
          repository: memcached:1.6.42
          pullPolicy: IfNotPresent
        args:
          - "-m 64"
        ports:
          - name: cache
            containerPort: 11211
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          tcpSocket:
            port: cache
          initialDelaySeconds: 5
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: cache
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

services:
  - name: app
    type: ClusterIP
    selector:
      component: app
    ports:
      - name: http
        port: 1337
        targetPort: http
        protocol: TCP

gateway:
  host: ""
  tls:
    enabled: true
