apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      restartPolicy: {{ .Values.pod.restartPolicy }}
      containers:
      - name: app
        image: {{ .Values.containers.app.image }}
        resources:
          limits:
            memory: {{ .Values.containers.app.resources.limits.memory }}
            cpu: {{ .Values.containers.app.resources.limits.cpu }}
        ports:
        - containerPort: 80
