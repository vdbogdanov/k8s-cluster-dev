ingressNginx:
  controller:
    service:
      externalTrafficPolicy: Local
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: monitoring
    image:
      PullPolicy: IfNotPresent
      registry: docker.io
      image: crowdsecurity/controller
      tag: v1.13.2
      digest: sha256:4575be24781cad35f8e58437db6a3f492df2a3167fed2b6759a6ff0dc3488d56
    extraVolumes:
      - name: crowdsec-bouncer-plugin
        emptyDir: {}
    extraInitContainers:
      - name: init-clone-crowdsec-bouncer
        image: crowdsecurity/lua-bouncer-plugin
        imagePullPolicy: IfNotPresent
        env:
          - name: API_URL
            value: "http://crowdsec-service.crowdsec.svc.cluster.local:8080"
          - name: API_KEY
            value: "qwerty1234"
          - name: BOUNCER_CONFIG
            value: "/crowdsec/crowdsec-bouncer.conf"
        command: ['sh', '-c', "sh /docker_start.sh; mkdir -p /lua_plugins/crowdsec/; cp -R /crowdsec/* /lua_plugins/crowdsec/"]
        volumeMounts:
          - name: crowdsec-bouncer-plugin
            mountPath: /lua_plugins
    extraVolumeMounts:
      - name: crowdsec-bouncer-plugin
        mountPath: /etc/nginx/lua/plugins/crowdsec
        subPath: crowdsec
    config:
      plugins: "crowdsec"
      lua-shared-dicts: "crowdsec_cache: 50m"

certManager:
  crds:
    enabled: true

crowdsec:
  container_runtime: containerd
  agent:
    acquisition:
      - namespace: ingress-nginx
        podName: ingress-nginx-controller-*
        program: nginx
    env:
      # - name: DISABLE_ONLINE_API
      #   value: "true"
      - name: COLLECTIONS
        value: "crowdsecurity/nginx"
  # lapi:
  #   env:
  #     - name: DISABLE_ONLINE_API
  #       value: "true"

monitoring:
  grafana:
    defaultDashboardsTimezone: Europe/Moscow
    adminUser: admin
    adminPassword: qwerty1234
    persistence:
      enabled: true
      size: 1Gi
  prometheus:
    prometheusSpec:
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
      additionalScrapeConfigs:
        - job_name: crowdsec
          metrics_path: /metrics
          scheme: http
          static_configs:
          - targets: [crowdsec-service.crowdsec.svc.cluster.local:6060]

gitlabRunner:
  gitlabUrl: https://gitlab.com
  runnerToken: qwerty1234
  rbac:
    create: true
  serviceAccount:
    create: true
  runners:
    config: |
      [[runners]]
        [runners.kubernetes]
          namespace = "{{ default .Release.Namespace .Values.runners.jobNamespace }}"
          image = "alpine"
          helper_image_flavor = "ubuntu"

marzban:
  config:
    vpn:
      vless:
        dest: google.com:443
        serverNames: ["google.com"]
        privateKey: qwerty1234
        SpiderX: /example
        shortIds: qwerty1234
        port: 30443

network:
  tls:
    issuerName: nginx-issuer
    secretName: nginx-tls
    server: https://acme-v02.api.letsencrypt.org/directory
  sites:
    - host: grafana.example.com
      svc:
        namespace: monitoring
        name: monitoring-grafana
        port: 80
        protocol: HTTP
      acl:
        - 10.42.0.0/16
    - host: vpn.example.com
      svc:
        namespace: marzban
        name: app
        port: 8000
        protocol: HTTPS
      acl:
        - 10.42.0.0/16
    - host: pasta.example.com
      svc:
        namespace: pasta
        name: app
        port: 7777
        protocol: HTTP
    - host: drawio.example.com
      svc:
        namespace: drawio
        name: app
        port: 8080
        protocol: HTTP
    - host: drawdb.example.com
      svc:
        namespace: drawdb
        name: app
        port: 80
        protocol: HTTP
    - host: pluml.example.com
      svc:
        namespace: plantuml
        name: app
        port: 8080
        protocol: HTTP
    - host: tools.example.com
      svc:
        namespace: tools
        name: app
        port: 80
        protocol: HTTP
    - host: vcenter.example.com
      svc:
        namespace: vcenter
        name: app
        port: 8989
        protocol: HTTPS
      acl:
        - 10.42.0.0/16
